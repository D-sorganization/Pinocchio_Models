name: CI Standard
on:
  push:
    branches: [main]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pick-runner:
    runs-on: d-sorg-fleet
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.check.outputs.runner }}
    steps:
      - name: Check for self-hosted runner
        id: check
        env:
          GH_TOKEN: ${{ secrets.RUNNER_CHECK_TOKEN }}
        run: "ONLINE=$(gh api /orgs/${{ github.repository_owner }}/actions/runners \\\n  --jq '[.runners[] | select(.status == \"online\") | select(.labels[].name == \"d-sorg-fleet\")] | length' \\\n  2>/dev/null || echo \"0\")\nif [[ \"$ONLINE\" -gt 0 ]]; then\n  echo \"runner=d-sorg-fleet\" >> $GITHUB_OUTPUT\n  echo \"Self-hosted runner online — routing locally\"\nelse\n  echo \"runner=ubuntu-latest\" >> $GITHUB_OUTPUT\n  echo \"No self-hosted runner — using GitHub-hosted\"\nfi"
  quality-gate:
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: always
      - name: Set up Python venv
        run: |
          for PYTHON in python3.11 python3.12 python3.10 python3; do
            if command -v "$PYTHON" &>/dev/null; then
              echo "Using $PYTHON ($($PYTHON --version))"
              "$PYTHON" -m venv "$RUNNER_TEMP/ci-venv"
              "$RUNNER_TEMP/ci-venv/bin/pip" install --upgrade pip setuptools wheel --quiet
              echo "$RUNNER_TEMP/ci-venv/bin" >> $GITHUB_PATH
              exit 0
            fi
          done
          echo "No Python3 found on PATH" && exit 1
      - run: pip install ruff==0.14.10 mypy==1.13.0 bandit==1.7.7

      - name: Lint
        run: ruff check src scripts tests examples

      - name: Check Formatting (ruff)
        run: ruff format --check src scripts tests examples

      - run: pip install mypy types-PyYAML types-requests
      - name: Install Package
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: pip install -e .[dev]

      - name: Verify Clean Working Tree
        run: |
          if git ls-files --others --exclude-standard | grep -qE '__pycache__|\.pyc$'; then
            echo "::error::Untracked __pycache__ or .pyc files detected."
            git ls-files --others --exclude-standard | grep -E '__pycache__|\.pyc$'
            exit 1
          fi
          echo "Working tree is clean."

      - run: mypy src --config-file pyproject.toml

      - name: Check Cyclomatic Complexity
        run: |
          pip install radon
          echo "=== Files with complexity > B (8) ==="
          radon cc -nc --min=B src/ || true
          echo ""
          echo "=== Files with complexity > C (10) ==="
          radon cc -nc --min=C src/ || true
          # Fail if any file exceeds complexity C (10)
          COMPLEX_FILES=$(radon cc -nc --min=C src/ | grep -c "^src" || true)
          if [ "$COMPLEX_FILES" -gt 0 ]; then
            echo "::error::Found $COMPLEX_FILES file(s) with cyclomatic complexity > C (10). Refactor or add explicit override."
            exit 1
          fi
          echo "All source files are within complexity limits."

      - name: Verify No Placeholders
        run: |
          violations=$(
            find . \( -path "./.git" -o -path "./.mypy_cache" -o -path "./.ruff_cache" -o -path "./__pycache__" -o -path "./scripts" \) -prune -o -type f -name "*.py" -print0 \
              | xargs -0 grep -nE "TODO|FIXME" || true
          )
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "::error::Placeholders found. Remove TODOs/FIXMEs or create tracked GitHub issues."
            exit 1
          fi

      - name: Security Audit
        run: |
          pip install pip-audit
          pip install --upgrade pygments
          pip-audit --skip-editable \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2026-32274 \
            --ignore-vuln CVE-2026-21883 \
            --ignore-vuln CVE-2026-27205 \
            --ignore-vuln CVE-2024-47081 \
            --ignore-vuln CVE-2026-25645

      - name: Bandit Security Scan
        run: |
          bandit -r src/ -ll -ii --format txt 2>&1

      - name: Generate SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py environment -o sbom.json --output-format JSON

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

    needs: pick-runner
  tests:
    needs:
      - pick-runner
      - quality-gate
    runs-on: ${{ needs.pick-runner.outputs.runner }}
    timeout-minutes: 15
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python venv
        run: |
          PYTHON="python${{ matrix.python }}"
          if ! command -v "$PYTHON" &>/dev/null; then
            echo "WARNING: $PYTHON not found, falling back to python3"
            PYTHON=python3
          fi
          echo "Using $PYTHON ($($PYTHON --version))"
          "$PYTHON" -m venv "$RUNNER_TEMP/ci-venv"
          "$RUNNER_TEMP/ci-venv/bin/pip" install --upgrade pip setuptools wheel --quiet
          echo "$RUNNER_TEMP/ci-venv/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        env:
          PYTHONDONTWRITEBYTECODE: 1
        run: pip install -e ".[dev]"

      - name: Verify Clean Working Tree
        run: |
          # Ensure no untracked __pycache__ or *.pyc files remain
          if git ls-files --others --exclude-standard | grep -qE '__pycache__|\.pyc$'; then
            echo "::error::Untracked __pycache__ or .pyc files detected."
            git ls-files --others --exclude-standard | grep -E '__pycache__|\.pyc$'
            exit 1
          fi
          echo "Working tree is clean."

      - name: Run Test Suite
        run: |
          python3 -m pytest \
            -n auto \
            --timeout=60 \
            --timeout-method=thread \
            -m "not slow and not requires_pinocchio" \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-config=pyproject.toml \
            --cov-fail-under=80 \
            --tb=short \
            -v
